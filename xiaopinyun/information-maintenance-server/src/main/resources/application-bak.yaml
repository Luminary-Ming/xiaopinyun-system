# Nacos 上的 yaml 文件备份
# 配置端口
server:
  port: 6060

spring:
  application:
    name: upload-server
  cloud:
    # 配置 nacos 注册中心的访问地址
    nacos:
      server-addr: localhost:8848
    sentinel:
      transport:
        dashboard: 127.0.0.1:2233
  mvc:
    servlet:
      # 项目根路径
      path: /
  # 配置数据库连接
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/xiaopinyun_db
    username: root
    password: leesin

# 配置 springboot 日志级别
logging:
  level:
    root: info
