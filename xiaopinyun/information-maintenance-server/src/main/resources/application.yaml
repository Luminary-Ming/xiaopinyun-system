# 配置端口
server:
  port: 6060

# 配置数据库连接
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/xiaopinyun_db
    username: root
    password: leesin
  servlet:
    multipart:
      # 文件上传限制
      max-file-size: 20MB
      max-request-size: 100MB
  mvc:
    servlet:
      path: /  # 项目根路径

# mybatis-plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 配置 mybatis-plus 日志
    map-underscore-to-camel-case: true # 是否开启下划线到驼峰命名的自动映射
  global-config:
    db-config:
      logic-delete-value: 1 # 逻辑删除值
      logic-not-delete-value: 0 # 逻辑未删除值

# 配置 springboot 日志级别
logging:
  level:
    root: info